<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8F8">
    <meta name="description" content="Habit Tracker - приложение для трэкинга привычек">
    <title>Habit Tracker</title>
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Firebase UI -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
    <script src="https://cdn.firebase.com/libs/firebaseui/6.0.1/firebaseui.js"></script>
    <link type="text/css" rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/6.0.1/firebaseui.css" />
</head>
<body>
    <div id="app" class="app-container">
        <!-- Загрузочный экран -->
        <div id="loading-screen" class="loading-screen">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
        
        <!-- Экран аутентификации -->
        <div id="auth-screen" class="auth-screen" style="display: none;">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>🎯 Habit Tracker</h1>
                    <p>Отслеживай свои привычки и достигай целей</p>
                </div>
                <div id="firebaseui-auth-container"></div>
            </div>
        </div>
        
        <!-- Основное приложение -->
        <div id="app-main" class="app-main" style="display: none;">
            <!-- Основной контент (меняется в зависимости от страницы) -->
            <div id="page-content" class="page-content">
                <!-- Динамический контент -->
            </div>
            
            <!-- Нижняя навигация -->
            <nav class="bottom-nav">
                <button class="nav-btn nav-btn-active" data-page="dashboard" title="Главная">
                    <span class="nav-icon">📅</span>
                    <span class="nav-label">Главная</span>
                </button>
                <button class="nav-btn" data-page="add-habit" title="Добавить">
                    <span class="nav-icon">➕</span>
                    <span class="nav-label">Добавить</span>
                </button>
                <button class="nav-btn" data-page="statistics" title="Статистика">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Статистика</span>
                </button>
                <button class="nav-btn" data-page="profile" title="Профиль">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Профиль</span>
                </button>
            </nav>
        </div>
    </div>
    
    <!-- Модальные окна -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;"></div>
    <div id="confirm-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="confirm-title">Подтверждение</h2>
            <p id="confirm-message"></p>
            <div class="modal-actions">
                <button class="btn btn-secondary btn-cancel">Отмена</button>
                <button class="btn btn-primary btn-confirm">Подтвердить</button>
            </div>
        </div>
    </div>
    
    <!-- Уведомления -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Скрипты -->
    <script src="js/utils.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
